<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Linksaw Snippets</title>
    <meta name="description" content="Manage your Linksaw Snippets, view, create, and edit them in this powerful and beautiful dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
</head>
<body>
    <div id="auth-overlay" class="overlay">
        <div class="glass-card auth-card">
            <img src="../../icon128.png" alt="Linksaw Logo" class="logo-img">
            <h1>Welcome to Linksaw</h1>
            <p>Sign in to sync and manage your snippets.</p>
            <button id="login-button" class="btn primary-btn btn-animate">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    <path fill="none" d="M0 0h48v48H0z" />
                </svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="dashboard-layout hidden">
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <img src="../../icon128.png" alt="Linksaw Logo" class="logo-img-small">
                <h2>Linksaw Snippets</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg> Dashboard</button>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar" id="user-avatar"></div>
                    <div class="user-details">
                        <span id="user-name">Loading...</span>
                    </div>
                </div>
                <button id="logout-button" class="btn outline-btn icon-btn" title="Sign Out">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar glass-panel">
                <div class="toolbar-filters">
                    <div class="search-wrap">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="search-input" placeholder="Search your snippets...">
                    </div>
                    <div class="filter-wrap">
                        <select id="category-filter" aria-label="Filter by category">
                            <option value="">All categories</option>
                        </select>
                    </div>
                    <button id="bulk-edit-btn" class="btn outline-btn">Bulk Edit List</button>
                </div>
                <button id="add-snippet-btn" class="btn primary-btn btn-animate">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                    New Snippet
                </button>
            </header>

            <div class="content-wrapper scroll-area">
                <div id="loading-spinner" class="spinner-container">
                    <div class="spinner"></div>
                </div>
                <div id="snippets-grid" class="grid-layout hidden">
                    <!-- Snippets will be injected here -->
                </div>
                <div id="empty-state" class="empty-state hidden">
                    <div class="empty-icon">✨</div>
                    <h3>No snippets found</h3>
                    <p>Create your first snippet to get started.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit/Add Modal Overlay -->
    <div id="modal-overlay" class="overlay hidden">
        <div class="glass-card modal">
            <div class="modal-header">
                <h2 id="modal-title">New Snippet</h2>
                <button id="modal-close" class="icon-btn ghost-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="snippet-form">
                <input type="hidden" id="snippet-id">
                <div class="input-group">
                    <label for="snippet-title">Title</label>
                    <input type="text" id="snippet-title">
                </div>
                <div class="input-group">
                    <label for="snippet-expansion">Expansion content</label>
                    <textarea id="snippet-expansion" rows="6" required></textarea>
                </div>
                <div class="input-group">
                    <label for="snippet-category">Category</label>
                    <input type="text" id="snippet-category">
                </div>
                <div class="modal-actions">
                    <button type="button" id="modal-cancel" class="btn outline-btn">Cancel</button>
                    <button type="submit" class="btn primary-btn btn-animate" id="save-btn">Save Snippet</button>
                </div>
            </form>
        </div>
    </div>

    <div id="bulk-modal-overlay" class="overlay hidden">
        <div class="glass-card modal bulk-modal">
            <div class="modal-header">
                <h2>Bulk Edit List</h2>
                <button id="bulk-modal-close" class="icon-btn ghost-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="bulk-form">
                <input type="hidden" id="bulk-original-category">
                <div class="input-group">
                    <label for="bulk-category-name">List name</label>
                    <input type="text" id="bulk-category-name" required>
                </div>
                <div class="input-group">
                    <label for="bulk-items">Items</label>
                    <textarea id="bulk-items" rows="14" required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="bulk-modal-cancel" class="btn outline-btn">Cancel</button>
                    <button type="submit" class="btn primary-btn btn-animate" id="bulk-save-btn">Save List</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
