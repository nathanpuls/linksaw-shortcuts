<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Pages</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #fff;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    h1 { font-size: 32px; line-height: 1.2; }
    h2 { margin-top: 48px; }
    h3 { margin-top: 32px; }

    a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    img {
      max-width: 100%;
      border-radius: 12px;
    }

    blockquote {
      border-left: 3px solid #e5e7eb;
      padding-left: 16px;
      color: #4b5563;
    }

    code {
      background: #f3f4f6;
      padding: 0.2em 0.4em;
      border-radius: 5px;
    }

    pre {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
    }

    pre code {
      background: none;
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
    }
  </style>
</head>

<body>
  <main id="content">Loading...</main>

  <script>
    marked.setOptions({
      gfm: true,
      breaks: true
    });

    const content = document.getElementById("content");

    // Your Google Sheet ID
    const SHEET_ID = "1YM3Kgc-uKrnZlvKFA9Ul-_d1NRk02FWfthSfsV0Mij8";

    async function loadMarkdown() {
      try {
        // Fetch CSV export of first sheet
        const response = await fetch(
          `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`
        );

        if (!response.ok) {
          throw new Error("Could not load Google Sheet");
        }

        const csv = await response.text();

        // Grab A1 only
        const firstCell = csv
          .split("\n")[0]
          .split(",")[0]
          .replace(/^"|"$/g, "")
          .replace(/""/g, '"');

        if (!firstCell.trim()) {
          throw new Error("A1 is empty");
        }

        content.innerHTML = marked.parse(firstCell);

      } catch (error) {
        console.error(error);

        content.innerHTML = `
          <h1>Could not load content</h1>
          <p>${error.message}</p>
        `;
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
