<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Linksaw</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #ffffff;
            color: #111827;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.7;
        }

        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 20px 80px;
        }

        h1 {
            font-size: 36px;
            line-height: 1.15;
        }

        h2 {
            margin-top: 48px;
        }

        h3 {
            margin-top: 32px;
        }

        p,
        li {
            font-size: 17px;
        }

        a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        img {
            max-width: 100%;
            border-radius: 12px;
            display: block;
            margin: 24px 0;
        }

        blockquote {
            border-left: 3px solid #e5e7eb;
            padding-left: 16px;
            color: #4b5563;
            margin: 24px 0;
        }

        code {
            background: #f3f4f6;
            padding: 0.2em 0.4em;
            border-radius: 5px;
            font-size: 0.92em;
        }

        pre {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
            overflow-x: auto;
            margin: 24px 0;
        }

        pre code {
            background: transparent;
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
        }

        th,
        td {
            border: 1px solid #e5e7eb;
            padding: 10px 12px;
            text-align: left;
        }

        hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 48px 0;
        }
    </style>
</head>

<body>
    <main id="content">Loading...</main>

    <script>
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        const content = document.getElementById("content");

        const SHEET_ID = "1YM3Kgc-uKrnZlvKFA9Ul-_d1NRk02FWfthSfsV0Mij8";
        const SHEET_GID = "0";

        window.loadSheetMarkdown = function (response) {
            try {
                const rows = response.table.rows;

                const markdown = rows?.[0]?.c?.[0]?.v || "";

                if (!markdown.trim()) {
                    throw new Error("Cell A1 is empty");
                }

                content.innerHTML = marked.parse(markdown);
            } catch (error) {
                content.innerHTML = `
          <h1>Could not load content</h1>
          <p>${error.message}</p>
        `;
            }
        };

        function loadMarkdownFromSheet() {
            const script = document.createElement("script");

            script.src =
                `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq` +
                `?gid=${SHEET_GID}` +
                `&range=A1` +
                `&headers=0` +
                `&tqx=responseHandler:loadSheetMarkdown`;

            script.onerror = function () {
                content.innerHTML = `
          <h1>Could not load content</h1>
          <p>Make sure the Google Sheet is shared as “Anyone with the link can view.”</p>
        `;
            };

            document.body.appendChild(script);
        }

        loadMarkdownFromSheet();
    </script>
</body>

</html>
