<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sheet A1 Renderer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #202124;
            background: #f8fafd;
        }

        .status {
            max-width: 680px;
            margin: 12vh auto;
            padding: 0 24px;
            line-height: 1.5;
        }

        .status h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        .status code,
        .status pre {
            background: #eef2f7;
            border-radius: 6px;
        }

        .status code {
            padding: 2px 6px;
        }

        .status pre {
            overflow: auto;
            padding: 14px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <main class="status">
        <h1>Loading Sheet HTML...</h1>
        <p>Reading HTML from <code>Sheet1!A1</code>.</p>
    </main>

    <script>
        const sheetId = "1YM3Kgc-uKrnZlvKFA9Ul-_d1NRk02FWfthSfsV0Mij8";
        const sheetName = "Sheet1";
        const range = "A1";

        function showError(error) {
            document.body.innerHTML = `
        <main class="status">
          <h1>Could not load the Sheet HTML</h1>
          <p>
            Check that the Google Sheet is shared with
            <code>Anyone with the link can view</code>, and that your HTML is in
            <code>Sheet1!A1</code>.
          </p>
          <pre>${String(error).replace(/[<>&]/g, (char) => ({
                "<": "&lt;",
                ">": "&gt;",
                "&": "&amp;"
            })[char])}</pre>
        </main>
      `;
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            })[char]);
        }

        function markdownToHtml(markdown) {
            const lines = markdown.replace(/\r\n/g, "\n").split("\n");
            const html = [];
            let paragraph = [];
            let listOpen = false;

            function renderInline(value) {
                return escapeHtml(value)
                    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
                    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                    .replace(/\*([^*]+)\*/g, "<em>$1</em>")
                    .replace(/`([^`]+)`/g, "<code>$1</code>");
            }

            function flushParagraph() {
                if (!paragraph.length) return;
                html.push(`<p>${renderInline(paragraph.join(" "))}</p>`);
                paragraph = [];
            }

            function closeList() {
                if (!listOpen) return;
                html.push("</ul>");
                listOpen = false;
            }

            for (const line of lines) {
                const trimmed = line.trim();

                if (!trimmed) {
                    flushParagraph();
                    closeList();
                    continue;
                }

                const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
                if (heading) {
                    flushParagraph();
                    closeList();
                    const level = heading[1].length;
                    html.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
                    continue;
                }

                const item = trimmed.match(/^[-*]\s+(.+)$/);
                if (item) {
                    flushParagraph();
                    if (!listOpen) {
                        html.push("<ul>");
                        listOpen = true;
                    }
                    html.push(`<li>${renderInline(item[1])}</li>`);
                    continue;
                }

                paragraph.push(trimmed);
            }

            flushParagraph();
            closeList();

            return `<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sheet Markdown</title>
  <style>
    body {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 22px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #181818;
      background: #fbfaf7;
      line-height: 1.6;
    }

    h1, h2, h3 {
      line-height: 1.05;
    }

    h1 {
      font-size: clamp(42px, 8vw, 78px);
      margin: 0 0 22px;
    }

    h2 {
      margin-top: 42px;
      font-size: 34px;
    }

    a {
      color: #3157ff;
      font-weight: 700;
    }

    img {
      display: block;
      max-width: 100%;
      margin: 28px 0;
      border-radius: 10px;
    }

    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #ece7dc;
    }
  </style>
</head>
<body>
  ${html.join("\n  ")}
</body>
</html>`;
        }

        function getRenderableHtml(value) {
            const trimmed = value.trim();
            const withoutCodeFence = trimmed
                .replace(/^```(?:html|markdown|md)?\s*/i, "")
                .replace(/\s*```$/i, "")
                .trim();

            if (/^<!doctype html/i.test(withoutCodeFence) || /^<html[\s>]/i.test(withoutCodeFence)) {
                return withoutCodeFence;
            }

            if (/<(head|body|main|section|div|h1|p|style|script|img|a)[\s>]/i.test(withoutCodeFence)) {
                return withoutCodeFence;
            }

            return markdownToHtml(withoutCodeFence);
        }

        window.renderFromSheet = function renderFromSheet(data) {
            const value = data.table.rows[0]?.c[0]?.v || "";

            if (!value.trim()) {
                showError(new Error("Sheet1!A1 is empty."));
                return;
            }

            const html = getRenderableHtml(value);

            document.open();
            document.write(html);
            document.close();
        };

        function loadSheetHtml() {
            const script = document.createElement("script");
            const url =
                `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq` +
                `?tqx=${encodeURIComponent("responseHandler:renderFromSheet;out:json")}` +
                `&sheet=${encodeURIComponent(sheetName)}` +
                `&range=${encodeURIComponent(range)}`;

            script.src = url;
            script.async = true;
            script.onerror = () => {
                showError(new Error("Google Sheets script load failed."));
            };

            document.head.appendChild(script);
        }

        loadSheetHtml();
    </script>
</body>

</html>
